services:
  postgres:
    image: postgres:16-alpine
    container_name: shkola-pk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shkola_pk
      POSTGRES_PASSWORD: Shk0laPK2026!Db
      POSTGRES_DB: shkola_pk_payload
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shkola_pk"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shkola-pk-network

  payload:
    build:
      context: ./payload-cms
      dockerfile: Dockerfile
    container_name: shkola-pk-payload
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://shkola_pk:Shk0laPK2026!Db@postgres:5432/shkola_pk_payload
      - PAYLOAD_SECRET=sk-pk-2026-payload-secret-key-secure
      - NEXT_PUBLIC_APP_URL=https://2980738.ru
      - PAYLOAD_PUBLIC_SERVER_URL=https://2980738.ru
      - NODE_ENV=production
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_REGION=${S3_REGION:-ru-1}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - payload_media:/app/media
    networks:
      - shkola-pk-network

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: shkola-pk-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_URL=https://2980738.ru
      - NEXT_PUBLIC_PAYLOAD_URL=https://2980738.ru
      - PAYLOAD_API_URL=http://payload:3001
      - PAYLOAD_SECRET=sk-pk-2026-payload-secret-key-secure
      - DATABASE_URL=postgresql://shkola_pk:Shk0laPK2026!Db@postgres:5432/shkola_pk_payload
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-test_shop_id}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY:-test_secret_key}
      - YOOKASSA_API_URL=https://api.yookassa.ru/v3
      - SMTP_HOST=smtp.mail.ru
      - SMTP_PORT=587
      - SMTP_USER=boss@2980738.ru
      - SMTP_PASS=${SMTP_PASS:-email_password_change_me}
      - EMAIL_FROM=Школа ПК <boss@2980738.ru>
      - NODE_ENV=production
    depends_on:
      - payload
    networks:
      - shkola-pk-network

  nginx:
    image: nginx:alpine
    container_name: shkola-pk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - payload
    networks:
      - shkola-pk-network

volumes:
  postgres_data:
  payload_media:

networks:
  shkola-pk-network:
    driver: bridge
